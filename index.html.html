<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gastos">
    <link rel="manifest" href="manifest.json">
    <title>Control de Gastos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.3);
            --bg: #0d1b2a;
            --surface: #1a2a3a;
            --surface2: #223344;
            --text: #e8f0fe;
            --text-muted: rgba(232,240,254,0.45);
            --positive: #00e5a0;
            --negative: #ff4560;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* PROFILE SWITCHER */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: relative;
            z-index: 100;
            padding-top: calc(10px + env(safe-area-inset-top));
        }

        .profiles-bar {
            display: flex;
            align-items: center;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .menu-btn:active {
            background: rgba(255,255,255,0.1);
            transform: scale(0.95);
        }

        .profile-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .profile-pill.active {
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        .profile-pill:active {
            background: rgba(255,255,255,0.1);
            transform: scale(0.95);
        }

        .profile-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
        }

        /* MAIN SWIPE CONTAINER */
        .swipe-container {
            display: flex;
            width: 400%;
            height: calc(100vh - 56px - env(safe-area-inset-top));
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .profile-screen {
            width: 25%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .profile-screen::-webkit-scrollbar { display: none; }

        /* NAV TABS */
        .nav-tabs {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .nav-tab {
            flex: 1;
            padding: 11px;
            text-align: center;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: white;
        }

        /* VIEWS */
        .view { display: none; }
        .view.active { display: block; }

        /* HEADER */
        .month-header {
            padding: 18px 18px 22px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .month-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .month-arrow {
            width: 34px; height: 34px;
            border-radius: 9px;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; border: none; color: white;
            transition: all 0.15s;
        }
        .month-arrow:active { transform: scale(0.9); background: rgba(255,255,255,0.12); }

        .month-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 7px;
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.7);
        }

        .balance-block { text-align: center; margin-bottom: 22px; }

        .balance-lbl {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .balance-num {
            font-size: 48px;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 9px;
            transition: color 0.3s;
        }

        .balance-change {
            font-size: 13px;
            font-weight: 400;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 13px;
        }

        .stat-lbl {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 5px;
        }

        .stat-val {
            font-size: 17px;
            font-weight: 300;
            letter-spacing: -0.5px;
        }

        .stat-bar {
            width: 100%; height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 1px;
            margin-top: 8px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.4s ease;
        }

        .savings-card {
            border-radius: 12px;
            padding: 13px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .savings-pct {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: -1px;
        }

        .savings-amt {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* CONTENT */
        .content {
            padding: 18px;
            padding-bottom: 80px;
        }

        .section-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .section-total {
            font-size: 15px;
            font-weight: 300;
        }

        .expense-row {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .expense-row:active { opacity: 0.7; }

        .exp-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 19px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .exp-info { flex: 1; min-width: 0; }
        .exp-name { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.85); margin-bottom: 2px; }
        .exp-pct { font-size: 10px; color: var(--text-muted); }
        .exp-amount { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.55); flex-shrink: 0; }

        .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 24px 0; }

        .other-row {
            display: flex;
            align-items: center;
            padding: 12px 13px;
            background: rgba(255,255,255,0.025);
            border-radius: 10px;
            margin-bottom: 7px;
            cursor: pointer;
        }
        .other-row:active { opacity: 0.7; }
        .other-name { flex: 1; font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 300; margin-right: 10px; }
        .other-amt { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.55); flex-shrink: 0; }

        .del-btn {
            background: #ff4560;
            color: white; border: none;
            width: 26px; height: 26px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-left: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1.5px dashed rgba(255,255,255,0.15);
            border-radius: 11px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 80px;
            transition: all 0.2s;
        }
        .add-btn:active { border-color: var(--accent); color: var(--accent); }

        .add-icon-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .add-icon-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.1);
        }

        .add-icon-btn-card {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            padding: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .add-icon-btn-card:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.15);
        }

        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .profile-menu-item:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.08);
        }
        .profile-menu-item.active {
            background: rgba(255,255,255,0.08);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .menu-item:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.08);
        }

        /* EMOJI PICKER */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 14px;
            max-height: 160px;
            overflow-y: auto;
        }

        .emoji-opt {
            width: 38px; height: 38px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .emoji-opt.selected {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }

        /* ANNUAL VIEW */
        .annual-hdr {
            padding: 24px 18px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .annual-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            text-align: center;
            margin-bottom: 20px;
        }

        .annual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .annual-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 13px;
            padding: 16px;
            text-align: center;
        }

        .annual-lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 7px;
        }

        .annual-val { font-size: 20px; font-weight: 300; letter-spacing: -0.5px; }

        .chart-section { padding: 18px; }
        .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

        .chart-wrap {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 13px;
            padding: 18px 14px 34px;
            margin-bottom: 20px;
            position: relative;
        }

        .bar-chart {
            height: 160px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
        }

        .bar {
            flex: 1;
            border-radius: 5px 5px 0 0;
            min-height: 4px;
            position: relative;
            transition: height 0.3s ease;
        }

        .bar-lbl {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--text-muted);
        }

        .table-wrap {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 13px;
            overflow: hidden;
            margin-bottom: 80px;
        }

        .t-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 12px;
        }

        .t-row.t-head {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            background: rgba(255,255,255,0.03);
        }

        .t-row:last-child { border-bottom: none; }
        .t-cell { color: rgba(255,255,255,0.65); }
        .t-cell.pos { color: var(--positive); }
        .t-cell.neg { color: var(--negative); }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: none; align-items: center; justify-content: center;
            z-index: 500;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.show { display: flex; }

        .modal-box {
            background: #1a2a3a;
            border-radius: 20px;
            padding: 24px;
            width: 88%;
            max-width: 380px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .modal-input {
            width: 100%;
            background: #0d1b2a;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 11px;
            padding: 14px;
            font-size: 22px;
            color: white;
            text-align: center;
            font-weight: 300;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .modal-input:focus { outline: none; border-color: var(--accent); }
        .modal-input-sm {
            font-size: 15px;
            text-align: left;
            margin-bottom: 12px;
        }

        .modal-btns { display: flex; gap: 10px; }

        .modal-btn {
            flex: 1; padding: 14px;
            border-radius: 11px; border: none;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }

        .modal-btn:active { transform: scale(0.97); }
        .btn-cancel { background: rgba(255,255,255,0.08); color: white; }
        .btn-save { color: white; }

        /* SWIPE INDICATOR */
        .swipe-hint {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 200;
        }

        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.25s;
        }

        .dot.active {
            width: 20px;
            border-radius: 3px;
            background: var(--accent);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
    <div id="profilesBar"></div>
    <button class="menu-btn" onclick="openMainMenu()">☰</button>
</div>

<!-- SWIPE CONTAINER -->
<div class="swipe-container" id="swipeContainer"></div>

<!-- SWIPE DOTS -->
<div class="swipe-hint" id="swipeDots"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title" id="modalTitle">Editar</div>
        <div id="modalInputs"></div>
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="modal-btn btn-save" id="modalSave" onclick="saveModal()">Guardar</button>
        </div>
    </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────
const STORAGE_KEY = 'gastos-app-v1';

// ─── ICON SVG GENERATOR ────────────────────────────────────────────
function getProfileIcon(profileId, size = 24) {
    const icons = {
        casa: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
            <path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.5523 5.44772 21 6 21H9M19 10L21 12M19 10V20C19 20.5523 18.5523 21 18 21H15M9 21C9.55228 21 10 20.5523 10 20V16C10 15.4477 10.4477 15 11 15H13C13.5523 15 14 15.4477 14 16V20C14 20.5523 14.4477 21 15 21M9 21H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`,
        personal: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M6 21C6 17.134 8.68629 14 12 14C15.3137 14 18 17.134 18 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>`,
        pareja: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
            <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5C22 12.27 18.6 15.36 13.45 20.03L12 21.35Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>`,
        ahorros: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            <path d="M4 8C4 8 6 6 9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M20 8C20 8 18 6 15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="9" cy="10" r="1.2" fill="currentColor"/>
            <circle cx="15" cy="10" r="1.2" fill="currentColor"/>
            <ellipse cx="12" cy="14" rx="3.5" ry="2.5" stroke="currentColor" stroke-width="2"/>
            <line x1="10.5" y1="15" x2="10.5" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="13.5" y1="15" x2="13.5" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6 16C6 16 8 19 12 19C16 19 18 16 18 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>`
    };
    return icons[profileId] || '';
}

// ─── PROFILES CONFIG ───────────────────────────────────────────────
const PROFILES = [
    {
        id: 'casa',
        name: 'Casa',
        emoji: '🏠',
        color: '#818cf8',
        gradient: 'linear-gradient(90deg, #818cf8, #a78bfa)',
        glow: 'rgba(129,140,248,0.25)',
        bg: '#0d1b2a',
        surface: '#1a2a3a',
        hasFixed: true,
        fixedExpenses: [
            { emoji: '🏠', name: 'Arriendo', custom: true },
            { emoji: '⚡', name: 'Electricidad', custom: true },
            { emoji: '💧', name: 'Agua', custom: true },
            { emoji: '📡', name: 'Internet', custom: true },
            { emoji: '🛒', name: 'Mercado', custom: true },
            { emoji: '🏢', name: 'Gasto Común', custom: true },
            { emoji: '📱', name: 'Plan Móvil Euri', custom: true },
            { emoji: '📞', name: 'Plan Móvil Fran', custom: true },
            { emoji: '🥬', name: 'Feria 1', custom: true },
            { emoji: '🥕', name: 'Feria 2', custom: true },
            { emoji: '📺', name: 'YouTube', custom: true },
            { emoji: '☁️', name: 'Google One Fran', custom: true },
            { emoji: '📦', name: 'Amazon Prime', custom: true },

function defaultData() {
    const d = {};
    PROFILES.forEach(p => {
        d[p.id] = {
            months: MONTHS.map((name, i) => ({
                name,
                incomes: [], // Array editable de ingresos
                fixedExpenses: p.fixedExpenses.map(e => ({ ...e, amount: 0 })),
                otherExpenses: []
            }))
        };
    });
    return d;
}

// Migrar datos viejos al nuevo formato de ingresos
PROFILES.forEach(p => {
    if (appData[p.id]) {
        appData[p.id].months.forEach(m => {
            // Si tiene el formato viejo (incomesFran, incomesEuri, incomesExtra)
            if (m.incomesFran !== undefined || m.incomesEuri !== undefined) {
                // Convertir al nuevo formato (array de ingresos)
                m.incomes = m.incomes || [];
                if (m.incomesFran > 0) m.incomes.push({ name: 'Ingreso Fran', amount: m.incomesFran });
                if (m.incomesEuri > 0) m.incomes.push({ name: 'Ingreso Euri', amount: m.incomesEuri });
                if (m.incomesExtra > 0) m.incomes.push({ name: 'Ingreso Extra', amount: m.incomesExtra });
                // Eliminar campos viejos
                delete m.incomesFran;
                delete m.incomesEuri;
                delete m.incomesExtra;
            }
            // Asegurar que incomes existe aunque esté vacío
            if (!m.incomes) m.incomes = [];
        });
    }
});

// ─── FORMAT ─────────────────────────────────────────────────────────
function fmt(n) {
    return '$' + Math.round(n).toLocaleString('es-CL', { maximumFractionDigits: 0 });
}

// Formatear input mientras escribe (agrega puntos cada 3 dígitos)
function formatInputValue(input) {
    let value = input.value.replace(/\D/g, ''); // Solo números
    if (value) {
        value = parseInt(value, 10).toLocaleString('es-CL');
    }
    input.value = value;
}

// Obtener valor numérico limpio de un input formateado
function parseInputValue(input) {
    return parseInt(input.value.replace(/\D/g, '') || '0', 10);
}

// Aplicar formato automático a un input
function setupFormattedInput(inputId) {
    setTimeout(() => {
        const input = document.getElementById(inputId);
        if (input) {
            // Formatear valor inicial si existe
            if (input.value) formatInputValue(input);
            // Formatear mientras escribe
            input.addEventListener('input', () => formatInputValue(input));
        }
    }, 50);
}

// ─── CALC ────────────────────────────────────────────────────────────
function calc(profileId, monthIdx) {
    const profile = PROFILES.find(p => p.id === profileId);
    const m = appData[profileId].months[monthIdx];
    const inc = m.incomes.reduce((s, e) => s + e.amount, 0);
    const fix = m.fixedExpenses.reduce((s, e) => s + e.amount, 0);
    const oth = m.otherExpenses.reduce((s, e) => s + e.amount, 0);
    const exp = fix + oth;
    let bal = inc - exp;
    
    // Si es perfil de ahorros, acumular balance de meses anteriores
    if (profile && profile.isSavings) {
        for (let i = 0; i < monthIdx; i++) {
            const prevMonth = appData[profileId].months[i];
            const prevInc = prevMonth.incomes.reduce((s, e) => s + e.amount, 0);
            const prevFix = prevMonth.fixedExpenses.reduce((s, e) => s + e.amount, 0);
            const prevOth = prevMonth.otherExpenses.reduce((s, e) => s + e.amount, 0);
            bal += prevInc - (prevFix + prevOth);
        }
    }
    
    const rate = inc > 0 ? (bal / inc) * 100 : 0;
    return { inc, fix, oth, exp, bal, rate };
}

}

function buildMonthly(p, pi) {
    const mi = currentMonths[pi];
    const m = appData[p.id].months[mi];
    const t = calc(p.id, mi);

    const prevBal = mi > 0 ? calc(p.id, mi - 1).bal : null;
    let changeStr = '● Primer mes';
    let changeColor = p.color;
    if (prevBal !== null) {
        const diff = t.bal - prevBal;
        const pct = prevBal !== 0 ? ((diff / Math.abs(prevBal)) * 100).toFixed(0) : 0;
        const arrow = diff >= 0 ? '↗' : '↘';
        changeStr = `${arrow} ${diff >= 0 ? '+' : ''}${pct}% vs ${MONTHS[mi - 1]}`;
        changeColor = diff >= 0 ? 'var(--positive)' : 'var(--negative)';
    }

    const balColor = t.bal >= 0 ? 'var(--positive)' : 'var(--negative)';
    const expPct = t.inc > 0 ? Math.min((t.exp / t.inc) * 100, 100) : 0;

    let fixedHTML = '';
    if (p.hasFixed) {
        fixedHTML = `
            <div class="section-hdr">
                <div class="section-title">Gastos Fijos</div>
                <div class="section-total" style="color:${p.color}">${fmt(t.fix)}</div>
            </div>
            ${m.fixedExpenses.map((e, ei) => {
                const pct = t.exp > 0 ? ((e.amount / t.exp) * 100).toFixed(1) : 0;
                const iconClick = e.custom
                    ? `event.stopPropagation(); iconMenu(${pi},${ei})`
                    : '';
                return `<div class="expense-row" onclick="editFixed(${pi},${ei})">
                    <div class="exp-icon" ${iconClick ? `onclick="${iconClick}"` : ''}
                        style="${e.custom ? 'cursor:pointer;' : ''}">${e.emoji}</div>
                    <div class="exp-info">
                        <div class="exp-name">${e.name}</div>
                        <div class="exp-pct">${pct}%</div>
                    </div>
                    <div class="exp-amount">${fmt(e.amount)}</div>
                </div>`;
            }).join('')}
            <button class="add-btn" style="border-color:${p.color}55;color:${p.color};margin-top:6px;margin-bottom:18px" onclick="addFixed(${pi})">+ Agregar Gasto Fijo</button>
            <div class="divider" style="margin-top:0"></div>
        `;
    }

    const othersHTML = m.otherExpenses.map((e, ei) => `
        <div class="other-row">
            <div class="other-name" onclick="editOther(${pi},${ei})">${e.name}</div>
            <div class="other-amt" onclick="editOther(${pi},${ei})">${fmt(e.amount)}</div>
            <button class="del-btn" onclick="deleteOther(${pi},${ei})">×</button>
        </div>
    `).join('');

    return `
        <div class="month-header">
            <div class="month-selector">
                <button class="month-arrow" onclick="changeMonth(${pi},-1)">◀</button>
                <div class="month-label">${m.name} ${currentYear}</div>
                <button class="month-arrow" onclick="changeMonth(${pi},1)">▶</button>
            </div>
            <div class="balance-block">
                <div class="balance-lbl">${p.isSavings ? 'Total Acumulado' : 'Balance'}</div>
                <div class="balance-num" style="color:${balColor}">${fmt(t.bal)}</div>
                <div class="balance-change" style="color:${changeColor}">${changeStr}</div>
            </div>
            ${p.isSavings ? `
                <div class="stat-card" onclick="toggleIncomes(${pi})" style="margin-bottom:12px;cursor:pointer">
                    <div class="stat-lbl">Aporte del Mes</div>
                    <div class="stat-val">${fmt(t.inc)}</div>
                    <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;background:${p.color}"></div></div>
                </div>
            ` : `
                <div class="stats-row">
                    <div class="stat-card" onclick="toggleIncomes(${pi})" style="cursor:pointer">
                        <div class="stat-lbl">Ingresos</div>
                        <div class="stat-val">${fmt(t.inc)}</div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;background:${p.color}"></div></div>
                    </div>

                        <div class="stat-val">${fmt(t.exp)}</div>

                    </div>
                </div>
                <div class="savings-card" style="background:rgba(255,255,255,0.05);background-size:100% 100%">
                    <div>
                        <div class="stat-lbl" style="color:rgba(255,255,255,0.5)">Tasa Ahorro</div>

function buildAnnual(p, pi) {
    let totalInc = 0, totalExp = 0;
    const balances = [];

    MONTHS.forEach((_, mi) => {
        const t = calc(p.id, mi);
        totalInc += t.inc;
        totalExp += t.exp;
        balances.push(t.bal);
    });

    const totalSav = totalInc - totalExp;
    const avg = totalSav / 12;

    const maxAbs = Math.max(...balances.map(Math.abs), 1);

    const barsHTML = balances.map((bal, mi) => {
        const h = Math.abs(bal) / maxAbs * 100;
        const color = bal >= 0 ? (p.gradient || p.color) : 'var(--negative)';
        return `<div class="bar" style="height:${h}%;background:${color};align-self:${bal >= 0 ? 'flex-end' : 'flex-start'}">
            <div class="bar-lbl">${MONTHS[mi][0]}</div>
        </div>`;
    }).join('');

    const tableRows = MONTHS.map((name, mi) => {
        const t = calc(p.id, mi);
        const cls = t.bal >= 0 ? 'pos' : 'neg';
        return `<div class="t-row">
            <div class="t-cell">${name}</div>
            <div class="t-cell">${fmt(t.inc)}</div>
            <div class="t-cell">${fmt(t.exp)}</div>
            <div class="t-cell ${cls}">${fmt(t.bal)}</div>
        </div>`;
    }).join('');

    return `
        <div class="annual-hdr">
            <div class="annual-title" style="background:${p.gradient || p.color};-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">${currentYear}</div>
            <div class="annual-grid">
                <div class="annual-card">
                    <div class="annual-lbl">Total Ingresos</div>
                    <div class="annual-val">${fmt(totalInc)}</div>
                </div>
                <div class="annual-card">
                    <div class="annual-lbl">Total Gastos</div>
                    <div class="annual-val">${fmt(totalExp)}</div>
                </div>
                <div class="annual-card" style="background:${p.gradient || p.color}">
                    <div class="annual-lbl" style="color:rgba(255,255,255,0.85)">Ahorro Total</div>
                    <div class="annual-val" style="color:white">${fmt(totalSav)}</div>
                </div>
            </div>
        </div>
        <div class="chart-section">
            <div class="chart-title">Balance Mensual</div>
            <div class="chart-wrap">
                <div class="bar-chart">${barsHTML}</div>
            </div>
            <div class="chart-title">Detalle</div>
            <div class="table-wrap">
                <div class="t-row t-head">
                    <div>Mes</div><div>Ingresos</div><div>Gastos</div><div>Balance</div>
                </div>
                ${tableRows}
            </div>
        </div>
    `;
}

// ─── SWIPE GESTURE ───────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, isSwiping = false;

document.getElementById('swipeContainer').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isSwiping = false;
}, { passive: true });

document.getElementById('swipeContainer').addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isSwiping && Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) > 10) isSwiping = true;
}, { passive: true });

document.getElementById('swipeContainer').addEventListener('touchend', e => {
    if (!isSwiping) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (Math.abs(dx) > 50 && dy < 80) {
        if (dx < 0 && currentProfile < PROFILES.length - 1) switchProfile(currentProfile + 1);
        else if (dx > 0 && currentProfile > 0) switchProfile(currentProfile - 1);
    }
}, { passive: true });

function importData() {
    closeModal();
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = event => {
            try {
                const data = JSON.parse(event.target.result);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                location.reload();
            } catch (err) {
                alert('Error al importar datos: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function exportData() {
    closeModal();
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data) {
            alert('No hay datos para exportar');
            return;
        }
        
        const blob = new Blob([data], { type: 'application/json' });
        const fileName = `gastos-backup-${new Date().toISOString().split('T')[0]}.json`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 100);
        setTimeout(() => alert('Archivo descargado: ' + fileName), 200);
    } catch (err) {
        alert('Error al exportar: ' + err.message);
    }
}

function suggestEmoji(text) {
    const lower = text.toLowerCase().trim();
    if (!lower) return null;
    // Buscar coincidencia exacta o parcial
    for (const [key, emoji] of Object.entries(EMOJI_SUGGESTIONS)) {
        if (lower.includes(key) || key.includes(lower)) return emoji;
    }
    return null;
}

        document.getElementById('suggestion-label').textContent = `Usar ${suggested} para "${value}"`;
        box.style.display = 'flex';

function saveModal() {
    if (!modalCtx) return;
    const { type, pi, ei, ii } = modalCtx;
    const p = PROFILES[pi];
    const m = appData[p.id].months[currentMonths[pi]];

    if (type === 'add-income') {
        const name = document.getElementById('inp-name').value.trim();
        const amount = parseInputValue(document.getElementById('inp-amt'));
        if (name) m.incomes.push({ name, amount });
    } else if (type === 'edit-income') {
        const name = document.getElementById('inp-name').value.trim();
        const amount = parseInputValue(document.getElementById('inp-amt'));
        if (name) {
            m.incomes[ii].name = name;
            m.incomes[ii].amount = amount;
        }
    } else if (type === 'fixed') {
        m.fixedExpenses[ei].amount = parseInputValue(document.getElementById('inp-amt'));
    } else if (type === 'other') {
        const name = document.getElementById('inp-name').value.trim();
        if (name) {
            m.otherExpenses[ei].name = name;
            m.otherExpenses[ei].amount = parseInputValue(document.getElementById('inp-amt'));
        }
    } else if (type === 'add-other') {
        const name = document.getElementById('inp-name').value.trim();
        const amount = parseInputValue(document.getElementById('inp-amt'));
        if (name) m.otherExpenses.push({ name, amount });
    } else if (type === 'add-fixed') {
        const name = document.getElementById('inp-name').value.trim();
        const emoji = modalCtx.selectedEmoji || '📌';
        if (name) {
            appData[PROFILES[pi].id].months.forEach(month => {
                month.fixedExpenses.push({ emoji, name, amount: 0, custom: true });
            });
        }
    } else if (type === 'change-emoji') {
        const newEmoji = modalCtx.selectedEmoji;
        // Cambiar emoji en todos los meses
        appData[PROFILES[pi].id].months.forEach(month => {
            if (month.fixedExpenses[ei]) {
                month.fixedExpenses[ei].emoji = newEmoji;
            }
        });
    }

    save();
    closeModal();
    refreshMonthly(pi);
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('show');
    document.getElementById('modalSave').style.display = 'block';
    modalCtx = null;
}

// Enter to save
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modal').classList.contains('show')) saveModal();
    if (e.key === 'Escape') closeModal();
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(registration => console.log('✓ Service Worker registrado'))
            .catch(err => console.log('✗ Error registrando SW:', err));
    });
}
</script>
